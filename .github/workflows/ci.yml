name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check backend/ --exit-zero

      - name: Test with pytest
        run: pytest tests/ -q --tb=short

  test-tui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: tui/go.sum

      - name: Build all TUIs
        run: make all

      - name: Vet
        run: go vet ./...

  test-ledger:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 23
        uses: actions/setup-node@v4
        with:
          node-version: "23"

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test
