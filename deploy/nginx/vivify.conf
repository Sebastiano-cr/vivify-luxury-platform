# =============================================================================
# Vivify Ecosystem — Nginx Reverse Proxy
# CIS NGINX v3.0.0 L1/L2 hardened | CVE-2026-42945 mitigated (≥1.30.1)
# =============================================================================

# ── Main context ──
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log crit;

events {
    multi_accept on;
    worker_connections 1024;
    use epoll;
}

http {
    # ── CIS 2.1.1: Only required modules ──
    # (compile-time: --without-http_autoindex_module --without-http_ssi_module)

    # ── CIS 2.5.1: Disable server tokens ──
    server_tokens off;
    more_set_headers "Server: ";  # Requires ngx_headers_more OR compile without --with-http_server_module

    # ── CIS 4.1.x: TLS / SSL ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;  # Mozilla Intermediate — client picks best
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_buffer_size 4k;
    # CIS 4.1.7: OCSP Stapling — Skip for Let's Encrypt (OCSP shut down Aug 2025)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── DH params (generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096) ──
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ── CIS 5.2.3: URI buffer ──
    large_client_header_buffers 4 16k;

    # ── CIS 5.2.2: Max body size ──
    client_max_body_size 10m;

    # ── CIS 2.4.3-4: Timeouts ──
    keepalive_timeout 10;
    send_timeout 10;
    client_body_timeout 10;
    client_header_timeout 10;

    # ── CIS 5.2.1: Proxy timeouts ──
    proxy_connect_timeout 5;
    proxy_send_timeout 10;
    proxy_read_timeout 30;

    # ── CIS 5.2.5: Rate limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=ledger:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;
    limit_req_status 429;

    # ── CIS 5.1.2: Connection limiting ──
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_conn_status 429;

    # ── CIS 3.x: Logging ──
    log_format json_combined escape=json
        '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';
    access_log /var/log/nginx/vivify-access.log json_combined buffer=32k flush=5s;

    # ── Upstreams (ports mapped per blue/green — deploy scripts rewrite these) ──
    upstream vivify_backend  { server 127.0.0.1:3334; }
    upstream soc_gateway    { server 127.0.0.1:3333; }
    upstream ledger_service { server 127.0.0.1:3002; }
    upstream mvp_service    { server 127.0.0.1:3001; }

    # ── Default server — CIS 2.4.2: Reject unknown hostnames ──
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/letsencrypt/live/app.vivify.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.vivify.com.br/privkey.pem;
        return 444;  # CIS: close connection silently
    }

    # ── Main server block ──
    server {
        listen 80;
        listen 443 ssl http2;
        server_name app.vivify.com.br api.vivify.com.br viewer.vivify.com.br sim.vivify.com.br;

        ssl_certificate /etc/letsencrypt/live/app.vivify.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.vivify.com.br/privkey.pem;

        # ── CIS 4.1.1: HTTP → HTTPS redirect ──
        if ($scheme = http) {
            return 301 https://$host$request_uri;
        }

        # ── Security headers (CIS 4.1.8, 5.3.2, 5.3.3) ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;  # Mozilla 2026: 0 disables broken IE legacy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ── Rate limiting (CIS 5.2.5) ──
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_per_ip 10;

        # ── Frontend (app.vivify.com.br) ──
        location / {
            root /var/www/vivify/current/frontend/dist;
            try_files $uri $uri/ /index.html;
            limit_req zone=static burst=50;
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ── Vivify API (api.vivify.com.br/vivify) ──
        location /vivify/ {
            proxy_pass http://vivify_backend/vivify/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;

            # CIS 5.1.2: Only allow GET, POST, PUT, PATCH, DELETE
            limit_except GET POST PUT PATCH DELETE {
                deny all;
            }
        }

        # ── Ledger (api.vivify.com.br/ledger) ──
        location /ledger/ {
            proxy_pass http://ledger_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=ledger burst=40;
        }

        # ── SOC Gateway (api.vivify.com.br/v1) ──
        location /v1/ {
            proxy_pass http://soc_gateway/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── MaterialView-Pro (sim.vivify.com.br) ──
        location /v1/simulate {
            proxy_pass http://mvp_service/v1/simulate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api burst=10;
        }

        # ── SuperSplat Viewer (viewer.vivify.com.br) ──
        location / {
            root /var/www/vivify/current/viewer;
            try_files $uri $uri/ =404;
            add_header X-Frame-Options "ALLOWALL" always;  # iframe permite embed
        }
    }
}
